logging:
  level.root: WARN
  level.no: ${LOG_LEVEL:INFO}
  level.org.springframework: WARN
  level.org.springframework.web: WARN
  level.org.apache.avro: ERROR
  level.org.apache.kafka: ERROR
server:
  port: 8080
management:
  endpoints:
    web:
      base-path: /
      path-mapping:
        info: ping
        health: ready
      exposure:
        include: health, info, prometheus
  metrics:
    tags:
      application: fdk-statistics-service
spring:
  security.oauth2.resourceserver.jwt:
    jwk-set-uri: ${KEYCLOAK_OIDC_ISSUER}/protocol/openid-connect/certs
    issuer-uri: ${KEYCLOAK_OIDC_ISSUER}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      properties:
        schema.registry.url: ${KAFKA_SCHEMA_REGISTRY:http://localhost:8081}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    generate-ddl: false
    hibernate.ddl-auto: none
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
application:
  prop: 1
  cors:
    originPatterns: "${CORS_ORIGIN_PATTERNS}"
scheduling.enabled: true

---
spring:
  config.activate.on-profile: dev
  security.oauth2.resourceserver.jwt:
    jwk-set-uri: https://auth.staging.fellesdatakatalog.digdir.no/realms/fdk/protocol/openid-connect/certs
    issuer-uri: https://auth.staging.fellesdatakatalog.digdir.no/realms/fdk
  datasource:
    url: jdbc:postgresql://localhost:5432/statistics
    username: postgres
    password: S3cret
application:
  scope: test.scope
  cors:
    originPatterns: "*"
logging.level.no: DEBUG
scheduling.enabled: false

---
spring:
  config.activate.on-profile: test
  security.oauth2.resourceserver.jwt:
    jwk-set-uri: http://localhost:5050/auth/realms/fdk/protocol/openid-connect/certs
    issuer-uri: http://localhost:5050/auth/realms/fdk
application:
  scope: test.scope
  cors:
    originPatterns: "*"
scheduling.enabled: false
